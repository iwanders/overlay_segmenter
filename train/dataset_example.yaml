_data_meta: &data_meta
    mask_layer: 1
    mask_alpha: 0.5

_post_process: &post_process
    - fine_blur
    - jpeg
    - fine_blur_jpg

_bg_input: &bg_input
    remove_alpha: true
    base_dir: "{base_dir}/background/"
    top_left: [105, 27]
    size: [1700, 825]
    # This is an option, but it takes more (v)ram...
    # It can also be done in post_process_image in the applicator.
    # augmentations: [flip_horizontal]
    device: cpu
    validation_split: true

_fg_input: &fg_input
    remove_alpha: false
    base_dir: "{base_dir}/foreground/"

config:
    base_dir: "../../dataset_example/"
    post_process:
        fine_blur: &blur_cfg
            function: blur
            config:
                min: 0.0
                max: 3.0
            ratio: 0.0
        jpeg: &jpeg_cfg
            function: jpg
            config:
                min: 50
                max: 100
            ratio: 0.0
        fine_blur_jpg:
            function: combined
            config:
                child_ratio: 1.0
                functions:
                    - <<: *blur_cfg
                    - <<: *jpeg_cfg
            ratio: 0.5
        augment_flip_horizontal:
            function: flip_horizontal
            ratio: 0.5

    image_applicators:
        bg_applicator:
            ratio: 1.0
            position_x: { mean: 0.5, sigma: 0.15, by_self: true }
            position_y: { mean: 0.5, sigma: 0.15, by_self: true }
            crop: [256, 256]
            post_process_image:
                - augment_flip_horizontal
        fg_applicator:
            ratio: 1.0
            position_x: { mean: 0.5, sigma: 0.4, by_self: true }
            position_y: { mean: 0.5, sigma: 0.4, by_self: true }
            blend_alpha:
                min: 0.3
                max: 0.5
        unit_applicator:
            ratio: 1.0
            position_x: { mean: 0.5, sigma: 0.4, by_self: false }
            position_y: { mean: 0.5, sigma: 0.4, by_self: false }
            count:
                min: 0
                max: 3
        text_applicator:
            ratio: 1.0
            position_x: { mean: 0.5, sigma: 0.1, by_self: false }
            position_y: { mean: 0.5, sigma: 0.1, by_self: false }
            count:
                min: 1
                max: 1
    image_groups:
        bg_LevelOne:
            dirs: [LevelOne]
            <<: *bg_input
        fg_LevelOne:
            dirs: [LevelOne]
            <<: *fg_input
        bg_LevelTwo:
            dirs: [LevelTwo]
            <<: *bg_input
        fg_LevelTwo:
            dirs: [LevelTwo]
            <<: *fg_input
        map_units:
            dirs: ["."]
            remove_alpha: false
            base_dir: "{base_dir}/disturbance/"
    glyphsets:
        example_glyphset:
            config: ./example_glyphset/test_font.yaml
    text_groups:
        overlay_text:
            glyph_set: example_glyphset
            canvas_height: 30
            canvas_baseline: 15
            background_color_rgba_u8: [0, 0, 0, 255]
            text_lines:
                - abb
                - abc
                - pap
                - pac

    generator:
        - inputs:
              - [bg_applicator, "bg_{label}"]
              - [fg_applicator, "fg_{label}"]
              - [unit_applicator, map_units]
              - [text_applicator, overlay_text]
          for_input_keys:
              label: [LevelOne, LevelTwo]
          <<: *data_meta
          post_process: *post_process
